# Docker Compose Configuration for Django Q with Redis
# إضافة هذه الأقسام إلى docker-compose.yml

services:
  # Redis Service for Django Q
  redis:
    image: redis:7-alpine
    container_name: idrissimart_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    restart: unless-stopped
    networks:
      - idrissimart_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Q Cluster Worker
  qcluster:
    build: .
    container_name: idrissimart_qcluster
    command: python manage.py qcluster
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - idrissimart_network
    environment:
      - DJANGO_SETTINGS_MODULE=idrissimart.settings.docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
    driver: local

networks:
  idrissimart_network:
    driver: bridge

# =======================
# Environment Variables (.env file)
# =======================
# Add these to your .env file:
#
# REDIS_HOST=redis
# REDIS_PORT=6379
# REDIS_DB=0
# REDIS_PASSWORD=your_secure_password_here
#
# =======================

# =======================
# Usage Commands
# =======================
# Build and start all services:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f qcluster
#   docker-compose logs -f redis
#
# Restart qcluster only:
#   docker-compose restart qcluster
#
# Stop all services:
#   docker-compose down
#
# Remove all data (DANGER):
#   docker-compose down -v
#
# Execute command in qcluster container:
#   docker-compose exec qcluster python manage.py shell
#
# Setup scheduled tasks:
#   docker-compose exec qcluster python manage.py setup_scheduled_tasks
#
# =======================
