# =============================================================================
# Docker Compose for Idrissimart Development Environment
# Services: MariaDB, Redis, Django Dev Server, Daphne, Django-Q, Nginx, SMTP4Dev
# For production use: docker-compose -f docker-compose.prod.yml
# =============================================================================

services:
  # =============================================================================
  # Database Service - MariaDB
  # =============================================================================
  db:
    image: mariadb:11.2
    container_name: idrissimart_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-idrissimart}
      MYSQL_USER: ${DB_USER:-idrissimart_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-idrissimart_password}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/conf.d:/etc/mysql/conf.d:ro
    ports:
      - "3306:3306"
    networks:
      - idrissimart_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =============================================================================
  # Cache Service - Redis
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: idrissimart_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - idrissimart_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Application Service - Django Development Server (HTTP)
  # =============================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: idrissimart_web
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput --clear &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=idrissimart.settings.docker
      - DATABASE_URL=mysql://${DB_USER:-idrissimart_user}:${DB_PASSWORD:-idrissimart_password}@db:3306/${DB_NAME:-idrissimart}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispassword}@redis:6379/0
    networks:
      - idrissimart_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # WebSocket Service - Daphne (ASGI/Channels)
  # =============================================================================
  daphne:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: idrissimart_daphne
    command: >
      daphne idrissimart.asgi:application
      --bind 0.0.0.0
      --port 8001
      --proxy-headers
      --access-log -
      --verbosity 2
    volumes:
      - ./:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=idrissimart.settings.local      
      - DATABASE_URL=mysql://${DB_USER:-idrissimart_user}:${DB_PASSWORD:-idrissimart_password}@db:3306/${DB_NAME:-idrissimart}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispassword}@redis:6379/0
    networks:
      - idrissimart_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # Task Queue Service - Django-Q
  # =============================================================================
  qcluster:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: idrissimart_qcluster
    command: python manage.py qcluster
    volumes:
      - ./:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=idrissimart.settings.local
      - DATABASE_URL=mysql://${DB_USER:-idrissimart_user}:${DB_PASSWORD:-idrissimart_password}@db:3306/${DB_NAME:-idrissimart}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispassword}@redis:6379/1
    networks:
      - idrissimart_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Reverse Proxy - Nginx
  # =============================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: idrissimart_nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - logs_volume:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
      - daphne
    networks:
      - idrissimart_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # Email Testing Service - SMTP4Dev (Development Only)
  # =============================================================================
  smtp4dev:
    image: rnwood/smtp4dev:latest
    container_name: idrissimart_smtp4dev
    ports:
      - "3100:80"      # Web UI on port 3100
      - "2525:25"      # SMTP port (using 2525 to avoid conflict with system mail)
    networks:
      - idrissimart_network
    restart: unless-stopped
    environment:
      - ServerOptions__HostName=smtp4dev

# =============================================================================
# Volumes
# =============================================================================
volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  logs_volume:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  idrissimart_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
