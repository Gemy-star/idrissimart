<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f5f7fa"/>

  <!-- Decorative gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B4C7A;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#4b315e;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad1)"/>

  <!-- Image icon -->
  <g transform="translate(200, 150)">
    <!-- Camera body -->
    <rect x="-50" y="-30" width="100" height="60" rx="8" fill="#e8ebf0" stroke="#6B4C7A" stroke-width="2"/>

    <!-- Lens -->
    <circle cx="0" cy="0" r="20" fill="#f5f7fa" stroke="#6B4C7A" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#e8ebf0"/>

    <!-- Flash -->
    <circle cx="35" cy="-20" r="6" fill="#6B4C7A" opacity="0.3"/>

    <!-- Text -->
    <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6B4C7A" opacity="0.6">
      لا توجد صورة
    </text>
  </g>

  <!-- Watermark pattern -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6B4C7A" opacity="0.2">
    IdrissiMart
  </text>
</svg>
