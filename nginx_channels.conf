# Nginx configuration for idrissimart.com
# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name idrissimart.com www.idrissimart.com;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name idrissimart.com www.idrissimart.com;

    # ── SSL (managed by Certbot — do not edit manually) ───────────────────────
    ssl_certificate     /etc/letsencrypt/live/idrissimart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/idrissimart.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size    100M;
    client_body_buffer_size 128k;
    client_header_timeout   15s;
    client_body_timeout     15s;
    send_timeout            15s;
    keepalive_timeout       65s;

    # ── File serving optimisations ────────────────────────────────────────────
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/font-woff
        application/font-woff2
        font/woff
        font/woff2
        font/opentype
        font/truetype
        image/svg+xml
        image/x-icon;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/idrissimart_access.log;
    error_log  /var/log/nginx/idrissimart_error.log warn;

    # ── Static files ──────────────────────────────────────────────────────────
    location /static/ {
        alias /srv/idrissimart/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Webfonts: CORS required by Firefox/Safari for cross-origin fonts
        location ~* \.(woff2?|ttf|eot|otf)$ {
            add_header Access-Control-Allow-Origin "*";
            add_header Cache-Control "public, immutable";
            expires 365d;
            access_log off;
        }

        # CSS/JS versioned by django-compressor hash — safe for 1-year cache
        location ~* \.(css|js)$ {
            add_header Cache-Control "public, immutable";
            expires 1y;
            access_log off;
        }

        # Images
        location ~* \.(png|jpg|jpeg|gif|ico|webp|avif|svg)$ {
            add_header Cache-Control "public, immutable";
            expires 30d;
            access_log off;
        }
    }

    # ── Media files (user uploads) ────────────────────────────────────────────
    location /media/ {
        alias /srv/idrissimart/media/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff";
        access_log off;

        # Block execution of uploaded scripts
        location ~* \.(php|py|pl|sh|cgi)$ {
            deny all;
        }
    }

    # ── Favicon & robots ──────────────────────────────────────────────────────
    location = /favicon.ico {
        alias /srv/idrissimart/staticfiles/favicon.ico;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log    off;
        log_not_found off;
    }

    location = /robots.txt {
        alias /srv/idrissimart/staticfiles/robots.txt;
        access_log    off;
        log_not_found off;
    }

    # ── WebSocket connections (Django Channels → Daphne) ─────────────────────
    location /ws/ {
        proxy_pass http://unix:/srv/idrissimart/daphne.sock;
        proxy_http_version 1.1;

        proxy_set_header Upgrade             $http_upgrade;
        proxy_set_header Connection          "upgrade";
        proxy_set_header Host                $host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;

        # Long timeout — WebSocket connections are persistent
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 75s;
        proxy_buffering       off;
        proxy_redirect        off;
    }

    # ── Regular HTTP requests (Django → Gunicorn) ─────────────────────────────
    location / {
        include proxy_params;
        proxy_pass http://unix:/srv/idrissimart/idrissimart.sock;

        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP         $remote_addr;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;

        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           16 8k;
        proxy_busy_buffers_size 16k;
    }
}
