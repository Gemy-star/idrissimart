<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة | إدريسي مارت</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: #f8f9fa;
            color: #2d3748;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 500px;
            text-align: center;
        }
        .code {
            font-size: 120px;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #6b4c7a, #4b315e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 16px 0 12px;
        }
        p {
            font-size: 1rem;
            color: #6c757d;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        a {
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: opacity .2s;
        }
        a:hover { opacity: .85; }
        .primary {
            background: linear-gradient(135deg, #6b4c7a, #4b315e);
            color: #fff;
        }
        .secondary {
            background: #fff;
            color: #2d3748;
            border: 2px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <h1>عذراً، الصفحة غير موجودة</h1>
        <p>
            الصفحة التي تبحث عنها غير موجودة أو تم نقلها إلى موقع آخر.<br>
            يمكنك العودة للصفحة الرئيسية أو تصفح الإعلانات المتاحة.
        </p>
        <div class="actions">
            <a href="/ar/" class="primary">الصفحة الرئيسية</a>
            <a href="/ar/classifieds/" class="secondary">تصفح الإعلانات</a>
        </div>
    </div>
</body>
</html>
