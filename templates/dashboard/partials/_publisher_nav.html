{% load i18n static %}
<div class="publisher-nav">
  <div class="publisher-nav-links">
    <!-- Ads -->
    <div class="accordion-item-nav">
      <a
        href="#"
        class="publisher-nav-item {% if active_nav == 'my_ads' or active_nav == 'expired_ads' or active_nav == 'create_ad' %} active {% endif %}"
        data-bs-toggle="collapse"
        data-bs-target="#adsCollapse"
        aria-expanded="{% if active_nav == 'my_ads' or active_nav == 'expired_ads' or active_nav == 'create_ad' %}true{% else %}false{% endif %}"
      >
        <i class="fas fa-bullhorn"></i>
        <span>{% trans "إدارة الإعلانات" %}</span>
        <i class="fas fa-chevron-down ms-auto"></i>
      </a>

      <div
        id="adsCollapse"
        class="collapse {% if active_nav == 'my_ads' or active_nav == 'expired_ads' or active_nav == 'create_ad' %} show {% endif %}"
      >
        <div class="accordion-body-nav">
          <a
            class="nav-sub-item {% if active_nav == 'my_ads' %}active{% endif %}"
            href="{% url 'main:my_ads' %}"
            >{% trans "إعلاناتي" %}</a
          >

          <a
            class="nav-sub-item {% if active_nav == 'expired_ads' %}active{% endif %}"
            href="{% url 'main:publisher_expired_ads' %}"
            >{% trans "إعلانات منتهية" %}</a
          >

          <a
            class="nav-sub-item {% if active_nav == 'create_ad' %}active{% endif %}"
            href="{% url 'main:ad_create' %}"
            >{% trans "إضافة إعلان" %}</a
          >
        </div>
      </div>
    </div>

    <!-- Packages -->
    <div class="accordion-item-nav">
      <a
        href="#"
        class="publisher-nav-item {% if active_nav == 'my_packages' or active_nav == 'upgrade_packages' %} active {% endif %}"
        data-bs-toggle="collapse"
        data-bs-target="#packagesCollapse"
      >
        <i class="fas fa-box"></i>
        <span>{% trans "الباقات" %}</span>
        <i class="fas fa-chevron-down ms-auto"></i>
      </a>

      <div
        id="packagesCollapse"
        class="collapse {% if active_nav == 'my_packages' or active_nav == 'upgrade_packages' %} show {% endif %}"
      >
        <div class="accordion-body-nav">
          <a
            class="nav-sub-item {% if active_nav == 'my_packages' %}active{% endif %}"
            href="{% url 'main:packages_list' %}"
            >{% trans "باقاتي" %}</a
          >

          <a
            class="nav-sub-item {% if active_nav == 'upgrade_packages' %}active{% endif %}"
            href="{% url 'main:packages_list' %}"
            >{% trans "ترقية الباقة" %}</a
          >
        </div>
      </div>
    </div>

    <!-- Settings -->
    <a
      href="{% url 'main:publisher_settings' %}"
      class="publisher-nav-item {% if active_nav == 'settings' %}active{% endif %}"
    >
      <i class="fas fa-cog"></i>
      <span>{% trans "الإعدادات" %}</span>
    </a>
  </div>
</div>
