{% load i18n static %}
<!-- Mobile Sidebar Toggle Button -->
<button class="admin-sidebar-toggle d-lg-none" id="adminSidebarToggle" aria-label="{% trans 'فتح القائمة' %}">
    <i class="fas fa-bars"></i>
</button>

<!-- Sidebar Overlay (mobile) -->
<div class="admin-sidebar-overlay d-lg-none" id="adminSidebarOverlay"></div>

<!-- Admin Dashboard Navigation Sidebar -->
<div class="admin-nav" id="adminSidebar">
    <div class="admin-sidebar-header d-lg-none">
        <h6 class="mb-0">
            <i class="fas fa-tachometer-alt me-2"></i>
            {% trans "لوحة التحكم" %}
        </h6>
        <button class="admin-sidebar-close" id="adminSidebarClose" aria-label="{% trans 'إغلاق القائمة' %}">
            <i class="fas fa-times"></i>
        </button>
    </div>
    <div class="admin-nav-links">

        <!-- Home / Dashboard -->
        <a href="{% url 'main:admin_dashboard' %}" class="nav-link-item {% if active_nav == 'dashboard' %}active{% endif %}">
            <i class="fas fa-tachometer-alt"></i>
            <span>{% trans "الرئيسية" %}</span>
        </a>

        <!-- Reports -->
        <a href="{% url 'main:admin_reports' %}" class="nav-link-item {% if active_nav == 'reports' %}active{% endif %}">
            <i class="fas fa-chart-line"></i>
            <span>{% trans "التقارير" %}</span>
        </a>

        <!-- Payments -->
        <a href="{% url 'main:admin_payments' %}" class="nav-link-item {% if active_nav == 'payments' %}active{% endif %}">
            <i class="fas fa-credit-card"></i>
            <span>{% trans "المدفوعات" %}</span>
        </a>

        <!-- Orders -->
        <a href="{% url 'main:admin_orders_list' %}" class="nav-link-item {% if active_nav == 'orders' %}active{% endif %}">
            <i class="fas fa-receipt"></i>
            <span>{% trans "الطلبات" %}</span>
        </a>

    </div>
</div>
