{% load static %}
{#
  Google AdSense slot component.
  Usage: {% include 'components/paid_ads/adsense.html' with slot=adsense_slots.home_banner %}
  The `slot` variable is an AdSenseSlot instance.
#}
{% if slot and slot.is_active %}
<div class="adsense-slot mb-4" data-slot="{{ slot.slot_key }}">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ slot.ad_client }}" crossorigin="anonymous"></script>
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="{{ slot.ad_client }}"
         data-ad-slot="{{ slot.ad_slot }}"
         data-ad-format="{{ slot.ad_format }}"
         {% if slot.is_responsive %}data-full-width-responsive="true"{% endif %}></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
{% endif %}
