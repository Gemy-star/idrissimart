{% extends "admin/change_list.html" %}
{% load i18n %}

{% block object-tools-items %}
    <li>
        <a href="{{ send_newsletter_url }}" class="addlink" style="background-color:var(--secondary-color);">
            ✉️ إرسال النشرة البريدية
            {% if active_count %}
                <span style="background:rgba(0,0,0,.25);border-radius:10px;padding:1px 7px;font-size:.8em;margin-right:4px;">
                    {{ active_count }}
                </span>
            {% endif %}
        </a>
    </li>
    {{ block.super }}
{% endblock %}
