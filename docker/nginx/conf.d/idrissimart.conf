# =============================================================================
# Nginx Configuration for Idrissimart - Docker Environment
# Handles both HTTP/HTTPS traffic, WebSocket connections, and static files
# =============================================================================

# Upstream for Daphne (ASGI/WebSocket server)
upstream daphne_server {
    server daphne:8001;
    keepalive 32;
}

# Upstream for Gunicorn (WSGI/HTTP server)
upstream gunicorn_server {
    server web:8000;
    keepalive 32;
}

# HTTP Server - Redirect to HTTPS (optional, comment out if not using SSL)
# server {
#     listen 80;
#     server_name your-domain.com www.your-domain.com;
#     return 301 https://$server_name$request_uri;
# }

# Main HTTP/HTTPS Server
server {
    listen 80;
    listen [::]:80;

    # Uncomment these lines when SSL is configured
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;

    server_name localhost;

    # SSL Configuration (uncomment when ready)
    # ssl_certificate /etc/nginx/ssl/certificate.crt;
    # ssl_certificate_key /etc/nginx/ssl/private.key;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # Uncomment when using HTTPS
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Limits
    client_max_body_size 20M;
    client_body_buffer_size 128k;

    # Timeout settings
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
    send_timeout 300;

    # Logging
    access_log /var/log/nginx/idrissimart_access.log;
    error_log /var/log/nginx/idrissimart_error.log warn;

    # Root directory (not used, but required)
    root /app/staticfiles;

    # Health check endpoint
    location /health/ {
        proxy_pass http://gunicorn_server;
        proxy_set_header Host $host;
        access_log off;
    }

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";

        # Enable CORS for fonts and assets
        location ~* \.(woff|woff2|ttf|eot|svg)$ {
            add_header Access-Control-Allow-Origin "*";
            expires 365d;
        }
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff";
    }

    # Favicon
    location = /favicon.ico {
        alias /app/staticfiles/favicon.ico;
        access_log off;
        log_not_found off;
        expires 30d;
    }

    # Robots.txt
    location = /robots.txt {
        alias /app/staticfiles/robots.txt;
        access_log off;
        log_not_found off;
    }

    # WebSocket connections (Django Channels)
    location /ws/ {
        proxy_pass http://daphne_server;
        proxy_http_version 1.1;

        # WebSocket specific headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Timeouts for WebSocket (24 hours)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 86400s;

        # Buffering (disabled for WebSocket)
        proxy_buffering off;
        proxy_redirect off;

        # Additional WebSocket settings
        proxy_cache_bypass $http_upgrade;
    }

    # Regular HTTP requests (Django/Gunicorn)
    location / {
        proxy_pass http://gunicorn_server;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Timeouts
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Redirect settings
        proxy_redirect off;
    }

    # Django admin static files (if not covered by /static/)
    location /admin/ {
        proxy_pass http://gunicorn_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
